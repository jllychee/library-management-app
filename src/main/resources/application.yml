server:
  port: 8080
  servlet:
    context-path: "/api/v1"

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/library_management
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: true
  application:
    name: library-management-app
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

logging:
  file:
    name: logs/app.log
  level:
    root: info
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE

# JWT Configuration
jwt:
  secret: OyF0epYib3QdHHfUc/PG6wjnkGuWZVVnDWcmxbL5tccsJ/xglg6fMWpr222kTWsc
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

library:
  fines:
    daily-rate: 1.00

# Email / Notification Configuration
# Set GMAIL_USERNAME and GMAIL_APP_PASSWORD in the environment to enable real delivery.
# When unset, the app still boots; SMTP failures are caught and logged, never fatal.
notification:
  from-address: ${GMAIL_USERNAME:no-reply@library.local}
  # Days to wait before re-notifying the same overdue borrowing
  overdue-remind-days: 3
  # Overdue scan runs daily at 08:00 server-local time
  overdue-cron: "0 0 8 * * *"
